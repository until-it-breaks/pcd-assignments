networks:
  pekko-network:
    driver: bridge

services:
  control-unit-node:
    build:
      context: .
      dockerfile: Dockerfile
    image: smart-home-cluster:latest
    networks:
      - pekko-network
    environment:
      - NODE_HOST=control-unit-node
      - NODE_PORT=1600
      - SEED_HOST=control-unit-node
      - SEED_PORT=1600
    command: ["control-unit"]
    ports:
      - "1600:1600"

  keypad-node:
    image: smart-home-cluster:latest
    networks:
      - pekko-network
    environment:
      - NODE_HOST=keypad-node
      - NODE_PORT=1601
      - SEED_HOST=control-unit-node
      - SEED_PORT=1600
    command: ["keypad"]

  sensors-node:
    image: smart-home-cluster:latest
    networks:
      - pekko-network
    environment:
      - NODE_HOST=sensors-node
      - NODE_PORT=1602
      - SEED_HOST=control-unit-node
      - SEED_PORT=1600
    command: ["sensors"]